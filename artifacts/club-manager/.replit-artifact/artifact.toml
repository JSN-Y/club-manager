kind = "web"
previewPath = "/"
title = "Mosaic Workshops - Club Manager"
version = "1.0.0"
id = "artifacts/club-manager"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24124

[services.development]
run = "pnpm --filter @workspace/club-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/club-manager", "run", "build" ]
serve = "static"
publicDir = "artifacts/club-manager/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24124"
BASE_PATH = "/"
